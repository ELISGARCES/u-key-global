<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-KEY GLOBAL | BÓVEDA DE IDENTIDAD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; display: flex; justify-content: center; padding: 20px; color: white; overflow-x: hidden; }
        .reg-card { background: #1a1a1a; border: 1px solid #d4af37; border-radius: 20px; padding: 25px; width: 450px; text-align: center; border-bottom: 6px solid #d4af37; position: relative; min-height: 520px; }
        h2 { color: #d4af37; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .field-label { text-align: left; display: block; font-size: 10px; color: #777; margin: 8px 0 4px 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; padding: 11px; background: #050505; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 2px; font-size: 13px; box-sizing: border-box; }
        .btn-reg { background: #d4af37; color: #000; padding: 16px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .link-footer { font-size: 9px; color: #d4af37; text-decoration: none; display: block; text-align: left; margin-left: 5px; opacity: 0.6; margin-bottom: 8px; }

        /* MODAL DE SEGURIDAD (IPHONE STYLE) */
        #modal-seguridad { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 200; border-radius: 20px;
            flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box;
        }
        .pin-dot-container { display: flex; gap: 15px; margin: 20px 0; }
        .pin-dot { width: 12px; height: 12px; border: 2px solid #d4af37; border-radius: 50%; }
        
        /* ESTILOS DASHBOARD */
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
        .app-icon { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .icon-box { height: 45px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; }

        #capa-verificacion { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; border-radius: 20px; z-index: 100; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border: 2px solid #00ff00; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="reg-card" id="mi-panel">
        
        <div id="modal-seguridad">
            <h3 style="color:#d4af37; font-size: 14px;">ACCESO PROTEGIDO</h3>
            <p id="msg-banco" style="font-size: 10px; color: #aaa;"></p>
            <div class="pin-dot-container">
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            </div>
            <input type="password" id="inputPinEspecial" maxlength="4" placeholder="PIN" style="text-align:center; width:60%; font-size:20px; letter-spacing:5px;">
            <p id="error-intentos" style="color:red; font-size:10px; margin-top:10px;"></p>
            <button class="btn-reg" onclick="verificarPinEspecial()">DESBLOQUEAR</button>
            <button onclick="cerrarModal()" style="background:none; border:none; color:#777; margin-top:15px; cursor:pointer; font-size:10px;">CANCELAR</button>
        </div>

        <div id="capa-verificacion">
            <h3 style="color:#00ff00;">🔒 VERIFICACIÓN NEÓN</h3>
            <p style="font-size: 12px;">Introduce el código enviado a tu Gmail</p>
            <input type="text" id="codigoEntrada" placeholder="000000" style="text-align:center; font-size:24px; color:#00ff00; width: 80%;">
            <button class="btn-reg" style="background:#00ff00; width: 80%;" onclick="activarBoveda()">ACTIVAR AHORA</button>
        </div>

        <div id="contenido-registro">
            <h2>U-KEY GLOBAL</h2>
            <span class="field-label">Nombre y Apellido</span>
            <input type="text" id="regNombre" placeholder="Ej. Elis Garces">
            
            <span class="field-label">Correo GMAIL</span>
            <input type="email" id="regEmail" placeholder="usuario@gmail.com">
            
            <div class="flex-row">
                <div style="width: 55%;">
                    <span class="field-label">País / Área</span>
                    <select id="regArea">
                        <option value="+58" selected>🇻🇪 Venezuela (+58)</option>
                        <option value="+1">🇺🇸 USA (+1)</option>
                        <option value="+34">🇪🇸 España (+34)</option>
                        <option value="+57">🇨🇴 Colombia (+57)</option>
                        <option value="+54">🇦🇷 Argentina (+54)</option>
                        <option value="+56">🇨🇱 Chile (+56)</option>
                        <option value="+507">🇵🇦 Panamá (+507)</option>
                        <option value="+51">🇵🇪 Perú (+51)</option>
                        <option value="+52">🇲🇽 México (+52)</option>
                        <option value="+49">🇩🇪 Alemania (+49)</option>
                        <option value="+39">🇮🇹 Italia (+39)</option>
                        <option value="+351">🇵🇹 Portugal (+351)</option>
                        <option value="+44">🇬🇧 Reino Unido (+44)</option>
                    </select>
                </div>
                <div style="width: 45%;">
                    <span class="field-label">WhatsApp</span>
                    <input type="text" id="regTlf" placeholder="4121234567">
                </div>
            </div>

            <div class="flex-row">
                <div style="width: 50%;">
                    <span class="field-label">PIN Seguridad</span>
                    <input type="password" id="regPin" placeholder="****">
                </div>
                <div style="width: 50%;">
                    <span class="field-label">Cédula / DNI</span>
                    <input type="text" id="regDNI" placeholder="Documento">
                </div>
            </div>
            <button class="btn-reg" onclick="solicitar()">REGISTRAR IDENTIDAD</button>
        </div>
    </div>

    <script>
        let codigoReal = "";
        let intentosFallidos = 0;
        let urlDestino = "";
        const PIN_MAESTRO = "1234"; // Para pruebas, luego será el del registro

        async function solicitar() {
            const email = document.getElementById('regEmail').value;
            const nombre = document.getElementById('regNombre').value;
            if(!email || !nombre) { alert("Por favor, llena los datos principales."); return; }
            try {
                const res = await fetch('https://ukey-servidor.onrender.com/enviar_verificacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombre, email: email })
                });
                if(res.ok) {
                    const data = await res.json();
                    codigoReal = data.codigo_servidor;
                    document.getElementById('capa-verificacion').style.display = 'flex';
                } else { alert("Error: El servidor no responde."); }
            } catch (e) { alert("Error de conexión."); }
        }

        function activarBoveda() {
            if(document.getElementById('codigoEntrada').value === codigoReal) {
                renderDashboard();
            } else { alert("Código de Gmail incorrecto."); }
        }

        function renderDashboard() {
            document.getElementById('mi-panel').innerHTML = `
                <div id="dashboard-u" style="text-align:left;">
                    <h2 style="font-size:16px; color:#d4af37; margin-bottom:10px;">U-KEY DASHBOARD</h2>
                    <input type="text" placeholder="🔍 Buscar en Google o U-Store..." style="margin-bottom:15px; border-color:#d4af37; background:#000;">
                    
                    <div class="app-grid">
                        <div class="app-icon" onclick="abrirSeguridad('BANESCO', 'https://www.banescovirtual.com')">
                            <div class="icon-box" style="background:#004a99;">B</div><span style="font-size:8px;">BANESCO</span>
                        </div>
                        <div class="app-icon" onclick="abrirSeguridad('MERCANTIL', 'https://www.mercantilbanco.com')">
                            <div class="icon-box" style="background:#1d2165;">M</div><span style="font-size:8px;">MERCANTIL</span>
                        </div>
                        <div class="app-icon" onclick="abrirSeguridad('AMAZON', 'https://www.amazon.com')">
                            <div class="icon-box" style="background:#ff9900; color:#000;">a</div><span style="font-size:8px;">AMAZON</span>
                        </div>
                        <div class="app-icon" onclick="abrirSeguridad('M. LIBRE', 'https://www.mercadolibre.com.ve')">
                            <div class="icon-box" style="background:#fff159; color:#2d3277;">M</div><span style="font-size:8px;">M. LIBRE</span>
                        </div>
                        <div class="app-icon" onclick="alert('U-STORE: Iniciando Buscador Inteligente...')">
                            <div class="icon-box" style="border:1px dashed #d4af37;">+</div><span style="font-size:8px;">U-STORE</span>
                        </div>
                    </div>
                    <button class="btn-reg" style="margin-top:40px; background:transparent; color:#d4af37; border:1px solid #d4af37;" onclick="location.reload()">CERRAR SESIÓN</button>
                </div>
            `;
        }

        function abrirSeguridad(nombre, url) {
            if(intentosFallidos >= 3) {
                alert("SISTEMA BLOQUEADO. Revise su Gmail para desbloquear.");
                return;
            }
            urlDestino = url;
            document.getElementById('msg-banco').innerText = "Validando acceso para: " + nombre;
            document.getElementById('modal-seguridad').style.display = 'flex';
        }

        function verificarPinEspecial() {
            const pinEntrada = document.getElementById('inputPinEspecial').value;
            if(pinEntrada === PIN_MAESTRO) {
                window.open(urlDestino, '_blank');
                cerrarModal();
            } else {
                intentosFallidos++;
                document.getElementById('error-intentos').innerText = `Intentos fallidos: ${intentosFallidos}/3`;
                if(intentosFallidos >= 3) {
                    document.getElementById('modal-seguridad').innerHTML = "<h2 style='color:red;'>BÓVEDA BLOQUEADA</h2><p style='font-size:10px;'>Se ha enviado una alerta de seguridad a su correo.</p>";
                }
            }
        }

        function cerrarModal() {
            document.getElementById('modal-seguridad').style.display = 'none';
            document.getElementById('inputPinEspecial').value = "";
        }
    </script>
</body>
</html>
