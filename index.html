<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-KEY GLOBAL | Registro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; display: flex; justify-content: center; padding: 20px; color: white; }
        .reg-card { background: #1a1a1a; border: 1px solid #d4af37; border-radius: 20px; padding: 25px; width: 430px; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); border-bottom: 6px solid #d4af37; position: relative; }
        h2 { color: #d4af37; font-size: 26px; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .field-label { text-align: left; display: block; font-size: 10px; color: #777; margin: 8px 0 4px 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; padding: 11px; background: #050505; border: 1px solid #333; color: white; border-radius: 8px; outline: none; box-sizing: border-box; font-size: 13px; }
        .btn-reg { background: #d4af37; color: #000; padding: 16px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; transition: 0.3s; text-transform: uppercase; }
        #capa-verificacion { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; border-radius: 20px; z-index: 100; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; border: 2px solid #00ff00; }
    </style>
</head>
<body>
    <div class="reg-card" id="mi-panel">
        <div id="capa-verificacion">
            <h3 style="color:#00ff00;">🔒 VERIFICACIÓN NEÓN</h3>
            <p>Introduce el código enviado a tu Gmail</p>
            <input type="text" id="codigoEntrada" placeholder="000000" style="text-align:center; font-size:24px; color:#00ff00;">
            <button class="btn-reg" style="background:#00ff00; width:80%;" onclick="activarBoveda()">ACTIVAR AHORA</button>
        </div>

        <div id="contenido-registro">
            <h2>U-KEY GLOBAL</h2>
            <span class="field-label">Nombre y Apellido</span>
            <input type="text" id="regNombre" placeholder="Tu Nombre">
            <span class="field-label">Correo GMAIL</span>
            <input type="email" id="regEmail" placeholder="tu-correo@gmail.com">
            <button class="btn-reg" onclick="solicitar()">REGISTRAR IDENTIDAD</button>
        </div>
    </div>

    <script>
        let codigoReal = "";
        async function solicitar() {
            const email = document.getElementById('regEmail').value;
            const nombre = document.getElementById('regNombre').value;
            if(!email || !nombre) { alert("Llena los datos"); return; }

            try {
                const res = await fetch('https://ukey-servidor.onrender.com/enviar_verificacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombre, email: email })
                });

                if(res.ok) {
                    const data = await res.json();
                    codigoReal = data.codigo_servidor;
                    document.getElementById('capa-verificacion').style.display = 'flex';
                } else {
                    alert("Error 500: El servidor en Render falló al enviar el correo.");
                }
            } catch (e) {
                alert("Error de Conexión: El servidor está dormido o apagado.");
            }
        }

        function activarBoveda() {
            const ingresado = document.getElementById('codigoEntrada').value;
            if(ingresado === codigoReal && codigoReal !== "") {
                document.getElementById('mi-panel').innerHTML = "<h1 style='color:#d4af37'>🔓 BÓVEDA ABIERTA</h1>";
            } else { alert("Código mal puesto"); }
        }
    </script>
</body>
</html>
