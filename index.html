<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-KEY GLOBAL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; display: flex; justify-content: center; padding: 20px; color: white; }
        .reg-card { background: #1a1a1a; border: 1px solid #d4af37; border-radius: 20px; padding: 25px; width: 450px; text-align: center; border-bottom: 6px solid #d4af37; position: relative; min-height: 400px; }
        h2 { color: #d4af37; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .field-label { text-align: left; display: block; font-size: 10px; color: #777; margin: 8px 0 4px 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; padding: 11px; background: #050505; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 2px; font-size: 13px; box-sizing: border-box; }
        .btn-reg { background: #d4af37; color: #000; padding: 16px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .link-footer { font-size: 9px; color: #d4af37; text-decoration: none; display: block; text-align: left; margin-left: 5px; opacity: 0.6; margin-bottom: 8px; }
        #capa-verificacion { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; border-radius: 20px; z-index: 100; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border: 2px solid #00ff00; box-sizing: border-box; }
        .app-icon { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .app-icon:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="reg-card" id="mi-panel">
        <div id="capa-verificacion">
            <h3 style="color:#00ff00;">🔒 VERIFICACIÓN NEÓN</h3>
            <p style="font-size: 12px;">Introduce el código enviado a tu Gmail</p>
            <input type="text" id="codigoEntrada" placeholder="000000" style="text-align:center; font-size:24px; color:#00ff00; width: 80%;">
            <button class="btn-reg" style="background:#00ff00; width: 80%;" onclick="activarBoveda()">ACTIVAR AHORA</button>
        </div>

        <div id="contenido-registro">
            <h2>U-KEY GLOBAL</h2>
            <span class="field-label">Nombre y Apellido</span>
            <input type="text" id="regNombre" placeholder="Ej. Elis Garces">
            <span class="field-label">Correo GMAIL</span>
            <input type="email" id="regEmail" placeholder="usuario@gmail.com">
            
            <div class="flex-row">
                <div style="width: 50%;">
                    <span class="field-label">País</span>
                    <select id="regArea"><option value="+58">🇻🇪 Venezuela</option></select>
                </div>
                <div style="width: 50%;">
                    <span class="field-label">WhatsApp</span>
                    <input type="text" id="regTlf" placeholder="4121234567">
                </div>
            </div>

            <button class="btn-reg" onclick="solicitar()">REGISTRAR IDENTIDAD</button>
        </div>
    </div>

    <script>
        let codigoReal = "";

        async function solicitar() {
            const email = document.getElementById('regEmail').value;
            const nombre = document.getElementById('regNombre').value;
            if(!email || !nombre) { alert("Llena los datos"); return; }
            
            try {
                const res = await fetch('https://ukey-servidor.onrender.com/enviar_verificacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombre, email: email })
                });

                if(res.ok) {
                    const data = await res.json();
                    codigoReal = data.codigo_servidor;
                    document.getElementById('capa-verificacion').style.display = 'flex';
                } else {
                    alert("Error del servidor. Intenta de nuevo.");
                }
            } catch (e) {
                alert("Sin conexión con el servidor.");
            }
        }

        function activarBoveda() {
            const entrada = document.getElementById('codigoEntrada').value;
            if(entrada === codigoReal) {
                const panel = document.getElementById('mi-panel');
                panel.style.borderColor = "#d4af37";
                
                panel.innerHTML = `
                    <div id="dashboard-u" style="text-align:left;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <h2 style="margin:0; font-size:16px; color:#d4af37;">U-KEY DASHBOARD</h2>
                            <span id="reloj" style="color:#d4af37; font-family:monospace; font-size:10px;"></span>
                        </div>
                        <div style="background:#000; padding:12px; border-radius:10px; margin-bottom:15px; border-left:4px solid #d4af37;">
                            <p style="font-size:9px; color:#777; margin:0;">ID: <span style="color:#fff;">ELIS-1966-VEN</span></p>
                            <p style="font-size:9px; color:#777; margin:0;">CONEXIÓN: <span style="color:#00ff00;">ENCRIPTADA (LARA)</span></p>
                        </div>
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
                            <div class="app-icon" onclick="alert('Banesco Seguro')">
                                <div style="background:#004a99; height:45px; border-radius:10px; display:flex; justify-content:center; align-items:center; font-weight:bold;">B</div>
                                <span style="font-size:8px; display:block; margin-top:4px; text-align:center;">BANESCO</span>
                            </div>
                            <div class="app-icon" onclick="alert('Mercantil Seguro')">
                                <div style="background:#1d2165; height:45px; border-radius:10px; display:flex; justify-content:center; align-items:center; font-weight:bold;">M</div>
                                <span style="font-size:8px; display:block; margin-top:4px; text-align:center;">MERCANTIL</span>
                            </div>
                            <div class="app-icon">
                                <div style="background:#f3ba2f; height:45px; border-radius:10px; display:flex; justify-content:center; align-items:center; font-weight:bold; color:#000;">₿</div>
                                <span style="font-size:8px; display:block; margin-top:4px; text-align:center;">BINANCE</span>
                            </div>
                            <div class="app-icon">
                                <div style="background:#cc0000; height:45px; border-radius:10px; display:flex; justify-content:center; align-items:center; font-size:8px; font-weight:bold;">SENIAT</div>
                                <span style="font-size:8px; display:block; margin-top:4px; text-align:center;">IMPUESTOS</span>
                            </div>
                            <div class="app-icon">
                                <div style="background:#444; height:45px; border-radius:10px; display:flex; justify-content:center; align-items:center;">✉️</div>
                                <span style="font-size:8px; display:block; margin-top:4px; text-align:center;">GMAIL</span>
                            </div>
                            <div class="app-icon" style="border:1px dashed #d4af37; border-radius:10px;">
                                <div style="height:45px; display:flex; justify-content:center; align-items:center; font-size:18px;">+</div>
                                <span style="font-size:8px; display:block; margin-top:4px; text-align:center;">U-STORE</span>
                            </div>
                        </div>
                        <button class="btn-reg" style="margin-top:20px; background:transparent; color:#d4af37; border:1px solid #d4af37;" onclick="location.reload()">CERRAR SESIÓN</button>
                    </div>
                `;
                iniciarReloj();
            } else { alert("Código incorrecto."); }
        }

        function iniciarReloj() {
            setInterval(() => {
                const clock = document.getElementById('reloj');
                if(clock) clock.innerText = new Date().toLocaleTimeString();
            }, 1000);
        }
    </script>
</body>
</html>
