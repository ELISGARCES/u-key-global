<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-KEY GLOBAL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; display: flex; justify-content: center; padding: 20px; color: white; }
        .reg-card { background: #1a1a1a; border: 1px solid #d4af37; border-radius: 20px; padding: 25px; width: 450px; text-align: center; border-bottom: 6px solid #d4af37; position: relative; }
        h2 { color: #d4af37; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .field-label { text-align: left; display: block; font-size: 10px; color: #777; margin: 8px 0 4px 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; padding: 11px; background: #050505; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 2px; font-size: 13px; box-sizing: border-box; }
        .btn-reg { background: #d4af37; color: #000; padding: 16px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .link-footer { font-size: 9px; color: #d4af37; text-decoration: none; display: block; text-align: left; margin-left: 5px; opacity: 0.6; margin-bottom: 8px; }
        #capa-verificacion { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; border-radius: 20px; z-index: 100; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border: 2px solid #00ff00; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="reg-card" id="mi-panel">
        <div id="capa-verificacion">
            <h3 style="color:#00ff00;">🔒 VERIFICACIÓN NEÓN</h3>
            <p style="font-size: 12px;">Introduce el código enviado a tu Gmail</p>
            <input type="text" id="codigoEntrada" placeholder="000000" style="text-align:center; font-size:24px; color:#00ff00; width: 80%;">
            <button class="btn-reg" style="background:#00ff00; width: 80%;" onclick="activarBoveda()">ACTIVAR AHORA</button>
        </div>

        <div id="contenido-registro">
            <h2>U-KEY GLOBAL</h2>
            
            <span class="field-label">Nombre y Apellido</span>
            <input type="text" id="regNombre" placeholder="Ej. Elis Garces">
            
            <span class="field-label">Correo GMAIL</span>
            <input type="email" id="regEmail" placeholder="usuario@gmail.com">
            <a href="#" class="link-footer">¿Olvidó su correo?</a>
            
            <div class="flex-row">
                <div style="width: 50%;">
                    <span class="field-label">País / Área</span>
                    <select id="regArea">
                        <option value="+58" selected>🇻🇪 Venezuela (+58)</option>
                        <option value="+1">🇺🇸 USA (+1)</option>
                        <option value="+34">🇪🇸 España (+34)</option>
                        <option value="+57">🇨🇴 Colombia (+57)</option>
                        <option value="+54">🇦🇷 Argentina (+54)</option>
                        <option value="+56">🇨🇱 Chile (+56)</option>
                        <option value="+507">🇵🇦 Panamá (+507)</option>
                        <option value="+51">🇵🇪 Perú (+51)</option>
                        <option value="+52">🇲🇽 México (+52)</option>
                        <option value="+49">🇩🇪 Alemania (+49)</option>
                        <option value="+39">🇮🇹 Italia (+39)</option>
                        <option value="+351">🇵🇹 Portugal (+351)</option>
                        <option value="+44">🇬🇧 Reino Unido (+44)</option>
                    </select>
                </div>
                <div style="width: 50%;">
                    <span class="field-label">WhatsApp</span>
                    <input type="text" id="regTlf" placeholder="4121234567">
                </div>
            </div>

            <div class="flex-row">
                <div style="width: 50%;">
                    <span class="field-label">PIN Seguridad</span>
                    <input type="password" id="regPin" placeholder="****">
                    <a href="#" class="link-footer">¿Olvidó su PIN?</a>
                </div>
                <div style="width: 50%;">
                    <span class="field-label">Repetir PIN</span>
                    <input type="password" id="regPinConfirm" placeholder="****">
                </div>
            </div>

            <div class="flex-row">
                <div style="width: 55%;">
                    <span class="field-label">Clave Especial</span>
                    <input type="password" id="regClaveEspecial" placeholder="Secreta">
                    <a href="#" class="link-footer">¿Olvidó su Clave Especial?</a>
                </div>
                <div style="width: 45%;">
                    <span class="field-label">Cédula / DNI</span>
                    <input type="text" id="regDNI" placeholder="Documento">
                </div>
            </div>

            <button class="btn-reg" onclick="solicitar()">REGISTRAR IDENTIDAD</button>
        </div>
    </div>

    <script>
        let codigoReal = "";
        async function solicitar() {
            const email = document.getElementById('regEmail').value;
            const nombre = document.getElementById('regNombre').value;
            if(!email || !nombre) { alert("Llena los datos"); return; }
            
            try {
                const res = await fetch('https://ukey-servidor.onrender.com/enviar_verificacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombre, email: email })
                });

                if(res.ok) {
                    const data = await res.json();
                    codigoReal = data.codigo_servidor;
                    document.getElementById('capa-verificacion').style.display = 'flex';
                } else {
                    alert("Error 500: El servidor rechazó la conexión.");
                }
            } catch (e) {
                alert("Error: No hay conexión con el servidor.");
            }
        }

        function activarBoveda() {
            if(document.getElementById('codigoEntrada').value === codigoReal) {
                document.getElementById('mi-panel').innerHTML = "<div style='padding:50px;'><h1 style='color:#d4af37'>🔓 IDENTIDAD VERIFICADA</h1></div>";
            } else { alert("Código incorrecto."); }
        }
    </script>
</body>
</html>
